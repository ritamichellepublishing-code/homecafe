<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>☕ Home Barista Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fcfaf7;
      --panel: #ffffff;
      --text: #2f241c;
      --muted: #8d7a6b;
      --accent: #8a5a2b;
      --accent-light: #f4ece4;
      --line: rgba(138, 90, 43, 0.1);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      line-height: 1.5;
      padding-bottom: calc(100px + var(--safe-bottom));
    }

    header {
      padding: 2.5rem 1.2rem 1.5rem;
      background: var(--bg);
      text-align: center;
    }

    .app-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: #3a271a;
    }
    .app-logo em { color: var(--accent); font-style: italic; }
    .header-sub { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    .pantry-section {
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 1.2rem 0;
      margin-bottom: 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
      padding: 0 1.2rem 0.8rem;
    }

    .scroll-tray {
      display: flex;
      overflow-x: auto;
      padding: 0 1.2rem;
      gap: 0.6rem;
      scrollbar-width: none;
    }
    .scroll-tray::-webkit-scrollbar { display: none; }

    .pill {
      white-space: nowrap;
      padding: 0.6rem 1rem;
      border-radius: 100px;
      background: var(--accent-light);
      border: 1px solid transparent;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
    }
    .pill.on { background: var(--accent); color: white; }

    .menu-container { padding: 0 1.2rem; }

    .drink-card {
      background: var(--panel);
      border-radius: 18px;
      margin-bottom: 1rem;
      border: 1px solid var(--line);
      overflow: hidden;
    }
    .drink-card.match { border: 2px solid var(--accent); }

    .card-trigger { padding: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
    .drink-name { font-weight: 700; font-size: 1.05rem; color: #3a271a; }
    .card-meta { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }

    .drink-details { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--line); background: #fafaf9; }
    .drink-details.open { display: block; }

    .step-item { margin-top: 1rem; display: flex; gap: 0.8rem; }
    .step-num {
      width: 22px; height: 22px; background: var(--accent); color: white;
      border-radius: 6px; font-size: 0.7rem; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; font-weight: 800;
    }
    .step-text { font-size: 0.9rem; color: #4f3c2d; }

    .tip-box {
      background: #fff8f0;
      border: 1px dashed var(--accent);
      padding: 0.8rem;
      border-radius: 12px;
      margin-top: 1rem;
      font-size: 0.8rem;
      font-style: italic;
      color: #5c3d1e;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.98);
      border-top: 1px solid var(--line);
      display: flex; justify-content: space-around;
      padding: 0.8rem 0 calc(0.8rem + var(--safe-bottom));
      z-index: 100;
    }
    .nav-item {
      background: none; border: none; font-size: 0.65rem; font-weight: 700;
      color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 1.2rem; }
  </style>
</head>
<body>

  <header>
    <div class="app-logo">Home Barista <em>Menu</em></div>
    <div class="header-sub">8 oz Servings • Ninja Specialty Settings</div>
  </header>

  <section class="pantry-section">
    <div class="section-label">Inventory Check</div>
    <div class="scroll-tray" id="pills">
      <span class="pill" data-i="espresso">Espresso (Bustelo)</span>
      <span class="pill" data-i="oat-milk">Oat Milk</span>
      <span class="pill" data-i="white-choc">White Choc Sauce</span>
      <span class="pill" data-i="caramel">Caramel Syrup</span>
      <span class="pill" data-i="vanilla">Vanilla Syrup</span>
      <span class="pill" data-i="cold-foam">Cold Foam</span>
      <span class="pill" data-i="whip">Whipped Cream</span>
      <span class="pill" data-i="vodka">Vodka</span>
      <span class="pill" data-i="kahlua">Kahlúa</span>
      <span class="pill" data-i="hennessy">Hennessy</span>
      <span class="pill" data-i="ginger-beer">Ginger Beer</span>
      <span class="pill" data-i="lemon">Lemon</span>
    </div>
  </section>

  <main class="menu-container" id="menu"></main>

  <nav class="bottom-nav" id="filters">
    <button class="nav-item active" data-f="all"><span class="nav-icon">📜</span>All</button>
    <button class="nav-item" data-f="coffee"><span class="nav-icon">☕</span>Coffee</button>
    <button class="nav-item" data-f="spirited"><span class="nav-icon">🥃</span>Spirited</button>
    <button class="nav-item" data-f="cocktail"><span class="nav-icon">🍸</span>Cocktails</button>
  </nav>

  <script>
    const drinks = [
      { id: 1, name: "White Choc Caramel Oat Latte", cat: "coffee", type: "Hot", ings: ["espresso", "oat-milk", "white-choc", "caramel", "whip"], steps: ["Base: 2oz hot espresso + 2 tsp white chocolate sauce + 1 tsp caramel syrup. Stir until dissolved.", "The Finish: Fill to the top with 4–5 oz steamed oat milk. Top with a swirl of whipped cream."], tip: "Stir white chocolate sauce while espresso is piping hot for a smooth texture." },
      { id: 2, name: "Salted Caramel White Mocha", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "white-choc", "caramel", "cold-foam"], steps: ["Base: 2oz hot espresso + 1 tbsp white chocolate sauce + 1 tsp caramel syrup. Stir until smooth.", "The Finish: Add ice to the glass, pour in 3 oz oat milk, and top with a generous layer of sweet cream cold foam."], tip: "1 Tbsp = 3 tsp. This recipe is sweeter and richer for iced application." },
      { id: 3, name: '"Cafe Boutique" Macchiato', cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "caramel", "cold-foam"], steps: ["The Base: 2 tsp caramel syrup + 4 oz oat milk + ice in your 8 oz glass.", "The Finish: Slowly pour 2 oz espresso over the milk/ice mixture. Top with a dollop of sweet cream cold foam."], tip: "Pouring the espresso last creates the iconic layered look." },
      { id: 4, name: "Iced Vanilla White Mocha", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "white-choc", "vanilla", "cold-foam"], steps: ["Base: 2 oz hot espresso + 2 tsp white chocolate sauce + 1 tsp vanilla syrup. Stir.", "Finish: Add ice, 3 oz oat milk, and top with sweet cream cold foam and a tiny white chocolate drizzle."], tip: "The white chocolate drizzle on the foam makes it look professional." },
      { id: 5, name: 'Vanilla Caramel "Cloud" Latte', cat: "coffee", type: "Hot", ings: ["espresso", "oat-milk", "vanilla", "caramel", "whip"], steps: ["Base: 2 oz hot espresso + 1 tsp vanilla syrup + 1 tsp caramel syrup.", "Finish: Froth 4 oz oat milk until very airy and pour over the coffee. Top with whipped cream and a crosshatch of caramel."], tip: "Use the Ninja frother for 30-45 seconds to get that 'Cloud' texture." },
      { id: 6, name: "Double Vanilla Shaken Espresso", cat: "coffee", type: "Iced", ings: ["espresso", "oat-milk", "vanilla", "cold-foam"], steps: ["Base: 3 oz espresso + 1 tbsp vanilla syrup + ice in a shaker/jar. Shake vigorously for 15 seconds.", "Finish: Pour into the glass (keep the ice). Top with 2 oz oat milk and a layer of sweet cream cold foam."], tip: "Shaking creates a 'micro-foam' from the coffee oils that tastes amazing." },
      { id: 7, name: "The Midnight Mocha", cat: "spirited", type: "Hot", ings: ["espresso", "hennessy", "oat-milk", "white-choc", "whip"], steps: ["Mix: In your 8 oz glass, stir 1 oz Hennessy, 2 oz hot Ninja Specialty brew, and 1 tbsp white chocolate sauce.", "Finish: Top with steamed oat milk and a swirl of whipped cream."], tip: "The Hennessy brings out a 'toasted' flavor in the oat milk." },
      { id: 8, name: "Kahlúa Cloud Latte", cat: "spirited", type: "Hot", ings: ["espresso", "kahlua", "oat-milk", "vanilla"], steps: ["Mix: Stir 1 oz Kahlúa, 2 oz hot espresso, and 1 tsp vanilla syrup.", "Finish: Fill the rest of the 8 oz glass with very foamy, aerated oat milk."], tip: "Kahlúa is a sweetener, so you likely won't need extra sugar." },
      { id: 9, name: 'The "Dunkin" Spike', cat: "spirited", type: "Iced", ings: ["espresso", "kahlua", "oat-milk", "caramel", "cold-foam"], steps: ["Mix: Combine 1 oz Kahlúa, 2 oz espresso, and 1 tsp caramel syrup. Stir well.", "Build: Fill your glass with ice and add 3 oz oat milk. Top with sweet cream cold foam."], tip: "Kahlúa settles at the bottom, creating a beautiful gradient look." },
      { id: 10, name: 'Espresso Martini', cat: "cocktail", type: "Shaken", ings: ["espresso", "vodka", "kahlua", "vanilla"], steps: ["Brew: Ninja Specialty (2 oz Cafe Bustelo). Let cool 2-3 mins (or freezer for 60s).", "Build: 2 oz cooled coffee, 1.5 oz Vodka, 0.5 oz (1 tbsp) Kahlúa, 1 tsp vanilla, pinch of salt.", "Shake: Fill shaker to the brim with ice. Shake as hard as you can for 20 seconds.", "Pour: Strain quickly into glass."], tip: "Don't skip the salt! It cuts the bitterness and makes the foam pop." },
      { id: 11, name: 'The "The Hen"', cat: "spirited", type: "Boutique", ings: ["espresso", "hennessy", "white-choc", "oat-milk"], steps: ["Brew 2 oz Specialty coffee directly onto 1 tbsp white chocolate sauce. Stir vigorously.", "Pour in 1 oz Hennessy and stir again to integrate.", "Add small amount of ice to chill without watering down.", "Top with 2 oz oat milk and a dash of cinnamon."], tip: "Tastes like liquid tiramisu." },
      { id: 12, name: 'Durham Velvet', cat: "coffee", type: "Iced", ings: ["espresso", "vanilla", "caramel", "oat-milk", "cold-foam"], steps: ["Combine 2 oz hot Specialty espresso with 1 tsp vanilla + 1 tsp caramel. Stir.", "Fill 3/4 with ice and 3 oz oat milk (leave 1 inch space).", "Froth sweet cream into thick foam and spoon over top.", "Pro Move: Drizzle a 'honeycomb' caramel pattern on top."], tip: "The honeycomb pattern will slowly sink, creating white-and-gold swirls." },
      { id: 13, name: 'NC Gold Fashioned', cat: "cocktail", type: "Stirred", ings: ["hennessy", "caramel", "vanilla"], steps: ["Mix 2 tsp caramel syrup, 1 tsp vanilla syrup, and a tiny splash of water (or salt).", "Add 2 oz Hennessy. Stir for 20 seconds to blend.", "Add one large ice cube.", "Finish: Squeeze an orange peel over the glass and drop it in."], tip: "Focuses on the depth of cognac and 'burnt sugar' notes." },
      { id: 14, name: 'Vanilla Lemon Drop', cat: "cocktail", type: "Shaken", ings: ["vodka", "lemon", "vanilla"], steps: ["Combine 2 oz Vodka, 1 oz fresh lemon juice, and 1 tbsp vanilla syrup.", "Shake with plenty of ice for 15 seconds.", "Strain into glass."], tip: "The vanilla syrup replaces plain sugar for a much smoother finish." },
      { id: 15, name: 'Hennessy "Buck"', cat: "cocktail", type: "Built", ings: ["hennessy", "lemon", "ginger-beer"], steps: ["Fill 8 oz glass to the top with ice.", "Pour in 1.5 oz Hennessy and 0.5 oz lemon juice.", "Top with 4 oz ginger beer. Give one quick stir. Garnish with lemon."], tip: "Ginger beer provides a sharp kick that cuts the richness of Hennessy." }
    ];

    let activeF = 'all';
    let haveIngs = new Set();
    let openId = null;

    function render() {
      const menu = document.getElementById('menu');
      const filtered = drinks.filter(d => {
        const typeMatch = activeF === 'all' || d.cat === activeF;
        const ingMatch = haveIngs.size === 0 || d.ings.every(i => haveIngs.has(i));
        return typeMatch && (haveIngs.size > 0 ? ingMatch : true);
      });

      menu.innerHTML = filtered.map(d => {
        const isMatch = haveIngs.size > 0 && d.ings.every(i => haveIngs.has(i));
        return `
          <div class="drink-card ${isMatch ? 'match' : ''}" onclick="toggle(${d.id})">
            <div class="card-trigger">
              <div>
                <div class="drink-name">${d.name}</div>
                <div class="card-meta">${d.type} • ${isMatch ? '✨ Ready' : 'Recipe'}</div>
              </div>
              <div style="color:var(--accent)">${openId === d.id ? '✕' : '→'}</div>
            </div>
            <div class="drink-details ${openId === d.id ? 'open' : ''}">
              ${d.steps.map((s, i) => `
                <div class="step-item">
                  <div class="step-num">${i+1}</div>
                  <div class="step-text">${s}</div>
                </div>
              `).join('')}
              <div class="tip-box"><strong>Barista Tip:</strong> ${d.tip}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggle(id) { openId = openId === id ? null : id; render(); }

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.nav-item');
      if (!btn) return;
      activeF = btn.dataset.f;
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    document.getElementById('pills').addEventListener('click', e => {
      if (!e.target.classList.contains('pill')) return;
      const i = e.target.dataset.i;
      haveIngs.has(i) ? haveIngs.delete(i) : haveIngs.add(i);
      e.target.classList.toggle('on');
      render();
    });

    render();
  </script>
</body>
</html>
